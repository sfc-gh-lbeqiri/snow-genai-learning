name: sales_semantic_model
description: >
  Semantic model for TPC-H sales data. Covers orders, line items, and customers.
  Use this model to answer questions about revenue, order volumes, shipping, and customer behaviour.

tables:
  - name: orders
    description: One row per customer order.
    base_table:
      database: GENAI_LEARNING
      schema: PUBLIC
      table: ORDERS_VW
    primary_key:
      columns:
        - order_key
    dimensions:
      - name: order_key
        description: Unique identifier for each order.
        expr: order_key
        data_type: NUMBER
      - name: customer_key
        description: Foreign key to the customer who placed the order.
        expr: customer_key
        data_type: NUMBER
      - name: order_status
        description: "Status of the order: O (open), F (fulfilled), P (in progress)."
        expr: order_status
        data_type: VARCHAR
      - name: order_date
        description: Date the order was placed.
        expr: order_date
        data_type: DATE
      - name: order_priority
        description: "Priority level: 1-URGENT, 2-HIGH, 3-MEDIUM, 4-NOT SPECIFIED, 5-LOW."
        expr: order_priority
        data_type: VARCHAR
      - name: clerk
        description: Clerk responsible for the order.
        expr: clerk
        data_type: VARCHAR
    measures:
      - name: total_revenue
        description: Sum of total_price across all orders.
        expr: total_price
        data_type: NUMBER
        default_aggregation: sum
      - name: order_count
        description: Total number of orders.
        expr: order_key
        data_type: NUMBER
        default_aggregation: count
      - name: avg_order_value
        description: Average value per order.
        expr: total_price
        data_type: NUMBER
        default_aggregation: avg

  - name: lineitem
    description: One row per line item within an order. Contains shipment and pricing details.
    base_table:
      database: GENAI_LEARNING
      schema: PUBLIC
      table: LINEITEM_VW
    primary_key:
      columns:
        - order_key
        - line_number
    dimensions:
      - name: order_key
        description: Foreign key to the parent order.
        expr: order_key
        data_type: NUMBER
      - name: return_flag
        description: "Return status: A (accepted), R (returned), N (not returned)."
        expr: return_flag
        data_type: VARCHAR
      - name: line_status
        description: "Line item status: O (open), F (fulfilled)."
        expr: line_status
        data_type: VARCHAR
      - name: ship_date
        description: Date the line item was shipped.
        expr: ship_date
        data_type: DATE
      - name: ship_mode
        description: Shipping mode (TRUCK, MAIL, SHIP, AIR, REG AIR, RAIL, FOB).
        expr: ship_mode
        data_type: VARCHAR
    measures:
      - name: gross_revenue
        description: Sum of extended_price (before discounts and tax).
        expr: extended_price
        data_type: NUMBER
        default_aggregation: sum
      - name: net_revenue
        description: Revenue after discount.
        expr: extended_price * (1 - discount)
        data_type: NUMBER
        default_aggregation: sum
      - name: total_quantity
        description: Total units shipped.
        expr: quantity
        data_type: NUMBER
        default_aggregation: sum
      - name: avg_discount
        description: Average discount applied.
        expr: discount
        data_type: NUMBER
        default_aggregation: avg
      - name: line_count
        description: Number of line items.
        expr: line_number
        data_type: NUMBER
        default_aggregation: count

  - name: customer
    description: One row per customer.
    base_table:
      database: GENAI_LEARNING
      schema: PUBLIC
      table: CUSTOMER_VW
    primary_key:
      columns:
        - customer_key
    dimensions:
      - name: customer_key
        description: Unique customer identifier.
        expr: customer_key
        data_type: NUMBER
      - name: customer_name
        description: Customer name.
        expr: customer_name
        data_type: VARCHAR
      - name: market_segment
        description: Market segment (AUTOMOBILE, BUILDING, FURNITURE, MACHINERY, HOUSEHOLD).
        expr: market_segment
        data_type: VARCHAR
    measures:
      - name: avg_account_balance
        description: Average account balance across customers.
        expr: account_balance
        data_type: NUMBER
        default_aggregation: avg
      - name: customer_count
        description: Total number of customers.
        expr: customer_key
        data_type: NUMBER
        default_aggregation: count

relationships:
  - name: orders_to_lineitem
    left_table: orders
    right_table: lineitem
    join_type: left_outer
    relationship_type: one_to_many
    left_columns:
      - order_key
    right_columns:
      - order_key
  - name: orders_to_customer
    left_table: orders
    right_table: customer
    join_type: left_outer
    relationship_type: many_to_one
    left_columns:
      - customer_key
    right_columns:
      - customer_key

verified_queries:
  - name: total_revenue_by_month
    question: What is the total revenue by month?
    sql: >
      SELECT DATE_TRUNC('month', order_date) AS month,
             SUM(total_price) AS total_revenue
      FROM GENAI_LEARNING.PUBLIC.ORDERS_VW
      GROUP BY 1
      ORDER BY 1
  - name: top_10_customers_by_revenue
    question: Who are the top 10 customers by total order value?
    sql: >
      SELECT c.customer_name,
             SUM(o.total_price) AS total_revenue
      FROM GENAI_LEARNING.PUBLIC.ORDERS_VW o
      JOIN GENAI_LEARNING.PUBLIC.CUSTOMER_VW c ON o.customer_key = c.customer_key
      GROUP BY 1
      ORDER BY 2 DESC
      LIMIT 10
  - name: revenue_by_market_segment
    question: What is the revenue breakdown by market segment?
    sql: >
      SELECT c.market_segment,
             SUM(o.total_price) AS total_revenue,
             COUNT(o.order_key) AS order_count
      FROM GENAI_LEARNING.PUBLIC.ORDERS_VW o
      JOIN GENAI_LEARNING.PUBLIC.CUSTOMER_VW c ON o.customer_key = c.customer_key
      GROUP BY 1
      ORDER BY 2 DESC
